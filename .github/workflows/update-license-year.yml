name: Update License Year

on:
  schedule:
    # it triggers at 1st of Jan each year
    - cron: '0 0 1 1 *'
  workflow_dispatch:

jobs:
  update-year:
    runs-on: ubuntu-latest
    permissions:
      contents: write # set permissions to push commit 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update year in LICENSE and README
        run: |
          PREV_YEAR=$(date +%Y -d "last year")
          CURR_YEAR=$(date +%Y)
          
          sed -i "s/$PREV_YEAR/$CURR_YEAR/g" LICENSE || echo "No LICENSE file"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add LICENSE README.md
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update license year to $(date +%Y)" && git push)
